*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:"Inter",sans-serif;background:#f5f6f8;color:#1a1a2e;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
:root{
  --blue:#0066cc;--blue-light:#e8f2ff;--blue-mid:#0052a3;
  --green:#00875a;--green-light:#e6f4f0;
  --gold:#c9920a;--gold-light:#fef9ec;
  --silver:#5a6478;--silver-light:#f0f2f5;
  --red:#dc2626;--orange:#e65100;
  --border:#e2e5ec;--border-mid:#cdd1db;
  --bg:#f5f6f8;--white:#fff;
  --text:#1a1a2e;--text2:#4a5568;--muted:#8896ab;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
.app{display:flex;flex-direction:column;height:100dvh}
.header{background:var(--white);border-bottom:3px solid var(--blue);padding:calc(var(--safe-top) + 10px) 1rem 10px;flex-shrink:0}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.logo-area{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:0.72rem;flex-shrink:0}
.logo-text{display:flex;flex-direction:column}
.logo-title{font-size:1rem;font-weight:700;color:var(--text)}
.logo-sub{font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.header-badge{background:var(--blue);color:white;font-size:0.6rem;font-weight:600;padding:3px 10px;border-radius:12px;text-transform:uppercase}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:"Inter",sans-serif;transition:color .15s}
.bn-item.active{color:var(--blue)}
.bn-icon{font-size:1.2rem}
.bn-label{font-size:0.58rem;font-weight:500;letter-spacing:.4px;text-transform:uppercase}
/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(60px + var(--safe-bottom))}
/* CUP TABS */
.cup-nav{background:var(--white);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;flex-shrink:0;padding:0 .5rem}
.cup-nav::-webkit-scrollbar{display:none}
.cup-tab{padding:10px 12px;font-size:.76rem;font-weight:500;color:var(--muted);border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:"Inter",sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px}
.cup-tab.active-oro{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
.cup-tab.active-plata{color:var(--silver);border-bottom-color:var(--silver);font-weight:600}
.tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-oro{background:var(--gold)}.dot-plata{background:var(--silver)}
/* ROUND TABS */
.round-nav{background:var(--white);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 .5rem;flex-shrink:0}
.round-nav::-webkit-scrollbar{display:none}
.rtab{padding:8px 11px;font-size:.73rem;font-weight:500;color:var(--muted);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:"Inter",sans-serif;transition:all .15s;display:flex;align-items:center;gap:4px}
.rtab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.badge-pend{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;font-size:.55rem;font-weight:700;background:var(--red);color:white}
/* CUP HERO */
.cup-hero{background:var(--white);border-bottom:1px solid var(--border);padding:12px 1rem 0}
.cup-hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cup-hero-title{font-size:.95rem;font-weight:700}
.cup-badge{font-size:.62rem;font-weight:600;padding:3px 10px;border-radius:12px;text-transform:uppercase}
.badge-oro{background:var(--gold-light);color:var(--gold)}.badge-plata{background:var(--silver-light);color:var(--silver)}
.progress-track{height:3px;background:#e8ecf0;border-radius:2px}
.progress-fill{height:100%;border-radius:2px;transition:width .5s}
.fill-oro{background:var(--gold)}.fill-plata{background:var(--silver)}
.cup-stats-row{display:flex;border-top:1px solid var(--border);margin-top:0}
.cup-stat{flex:1;padding:8px 4px;text-align:center;border-right:1px solid var(--border)}
.cup-stat:last-child{border-right:none}
.cs-val{font-size:1.05rem;font-weight:700;line-height:1.1}
.cs-lbl{font-size:.56rem;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:1px}
/* DRAW */
.draw-content{padding:1rem}
.round-group{margin-bottom:1.4rem}
.round-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:6px;border-bottom:2px solid var(--blue);margin-bottom:10px}
.rh-title{font-size:.75rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px}
.rh-count{font-size:.65rem;color:var(--muted)}
/* MATCH CARD */
.match-card{background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.match-card-header{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:#f8f9fb;border-bottom:1px solid var(--border)}
.mh-round{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.mh-right{display:flex;align-items:center;gap:5px}
.mh-status{font-size:.58rem;font-weight:600;padding:2px 7px;border-radius:10px;text-transform:uppercase}
.st-done{background:#e6f4f0;color:var(--green)}.st-pend{background:#fff3e0;color:var(--orange)}.st-tbd{background:#f0f2f5;color:var(--muted)}.st-wo{background:#fff0f0;color:var(--red)}.st-ret{background:#fff3e0;color:var(--orange)}
.stb-note{font-size:.56rem;background:#eef2ff;color:#4f46e5;padding:2px 6px;border-radius:4px;font-weight:600}
/* PLAYER ROWS */
.player-row{display:flex;align-items:center;padding:8px 10px;border-bottom:1px solid #f0f2f5;gap:8px;min-height:38px}
.player-row:last-of-type{border-bottom:none}
.player-row.winner{background:#f0f9f5}
.player-row.tbd{background:#fafbfc}
.pr-name{flex:1;font-size:.83rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;text-decoration:none;color:var(--text)}
.pr-name:hover{color:var(--blue);text-decoration:underline}
.player-row.winner .pr-name{font-weight:700}
.player-row.loser .pr-name{color:var(--muted)}
.player-row.tbd .pr-name{color:var(--muted);font-style:italic;font-weight:400;cursor:default}
.pr-sets{display:flex;gap:3px;flex-shrink:0}
.set-box{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:600;border:1px solid var(--border)}
.set-box.won{background:var(--text);color:white;border-color:var(--text)}
.set-box.lost{color:var(--muted)}
.set-box.tb{background:var(--blue-light);color:var(--blue);border-color:var(--blue);font-size:.6rem}
.pr-check{width:18px;flex-shrink:0;text-align:center;font-size:.72rem;color:var(--green);font-weight:700}
.wo-tag{font-size:.6rem;background:#fff0f0;color:var(--red);padding:1px 5px;border-radius:4px;font-weight:700;flex-shrink:0;border:1px solid #fecaca}
/* MATCH FOOTER */
.match-footer{padding:7px 10px;background:#fafbfc;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.btn-load{padding:5px 12px;border-radius:6px;border:1px solid var(--blue);background:transparent;color:var(--blue);font-size:.73rem;font-weight:600;cursor:pointer;font-family:"Inter",sans-serif;transition:all .15s}
.btn-load:hover{background:var(--blue);color:white}
.btn-edit{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.7rem;cursor:pointer;font-family:"Inter",sans-serif}
.score-form{display:flex;gap:6px;width:100%;align-items:center}
.input{flex:1;min-width:0;background:var(--white);border:1px solid var(--border-mid);border-radius:6px;padding:6px 10px;color:var(--text);font-family:"Inter",sans-serif;font-size:.82rem;outline:none;transition:border-color .15s}
.input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,102,204,.1)}
.input::placeholder{color:var(--muted)}
.btn-ok{padding:6px 14px;border-radius:6px;border:none;background:var(--blue);color:white;font-size:.76rem;font-weight:600;cursor:pointer;font-family:"Inter",sans-serif}
.btn-cancel{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.76rem;cursor:pointer;font-family:"Inter",sans-serif}
.score-hint{font-size:.58rem;color:var(--muted);width:100%}
/* PLAYERS SECTION */
.section-pad{padding:1rem}
.search-wrap{background:var(--white);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;padding:8px 12px;gap:8px;margin-bottom:1rem}
.search-icon{color:var(--muted);font-size:1rem;flex-shrink:0}
.search-input{flex:1;border:none;outline:none;font-family:"Inter",sans-serif;font-size:.85rem;color:var(--text);background:transparent}
.search-input::placeholder{color:var(--muted)}
.player-grid{display:flex;flex-direction:column;gap:6px}
.player-item{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .15s}
.player-item:hover,.player-item:active{border-color:var(--blue);background:var(--blue-light)}
.pi-name{font-size:.88rem;font-weight:500}
.pi-stats{font-size:.72rem;color:var(--muted)}
.pi-arrow{color:var(--muted);font-size:.9rem}
/* PLAYER DETAIL */
.back-bar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 1rem;display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
.back-btn{font-size:.82rem;color:var(--blue);font-weight:600;display:flex;align-items:center;gap:4px}
.player-hero{background:var(--white);border-bottom:1px solid var(--border);padding:14px 1rem}
.player-hero-name{font-size:1.1rem;font-weight:700;margin-bottom:8px}
.player-stat-row{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.pstat{flex:1;padding:8px 6px;text-align:center;border-right:1px solid var(--border)}
.pstat:last-child{border-right:none}
.pstat-val{font-size:1.1rem;font-weight:700}
.pstat-lbl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.phase-section{margin-bottom:1.2rem}
.phase-title{font-size:.72rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px;padding-bottom:6px;border-bottom:2px solid var(--blue);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.result-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.result-card.won{border-left:3px solid var(--green)}
.result-card.lost{border-left:3px solid #e2e5ec}
.rc-outcome{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0}
.rc-outcome.w{background:var(--green-light);color:var(--green)}
.rc-outcome.l{background:#f0f2f5;color:var(--muted)}
.rc-opp{flex:1;font-size:.85rem;font-weight:500;cursor:pointer;color:var(--text)}
.rc-opp:hover{color:var(--blue);text-decoration:underline}
.rc-score{font-size:.8rem;color:var(--text2);font-weight:500;text-align:right}
.rc-round{font-size:.6rem;color:var(--muted);text-align:right}
.rc-right{text-align:right}
.ret-tag{font-size:.58rem;background:#fff3e0;color:var(--orange);padding:1px 5px;border-radius:4px;font-weight:600;margin-left:4px}
/* GROUPS SECTION */
.group-match-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.gm-players{flex:1}
.gm-p1{font-size:.83rem;font-weight:600;cursor:pointer;color:var(--text)}
.gm-p1:hover{color:var(--blue);text-decoration:underline}
.gm-p2{font-size:.83rem;font-weight:400;color:var(--text2);cursor:pointer}
.gm-p2:hover{color:var(--blue);text-decoration:underline}
.gm-vs{font-size:.65rem;color:var(--muted);margin:1px 0}
.gm-score{font-size:.82rem;font-weight:500;color:var(--text);text-align:right;white-space:nowrap}
.gm-stb{font-size:.56rem;background:#eef2ff;color:#4f46e5;padding:1px 5px;border-radius:4px;margin-left:3px}
.gm-ret{font-size:.56rem;background:#fff3e0;color:var(--orange);padding:1px 5px;border-radius:4px;margin-left:3px}
/* TOAST */
.toast{position:fixed;bottom:calc(60px + var(--safe-bottom) + 10px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:white;padding:10px 20px;border-radius:20px;font-weight:600;font-size:.82rem;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:2rem;color:var(--muted);font-size:.85rem}

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const firebaseConfig={apiKey:"AIzaSyAWrYHWre7FcH1Zag-beRx1SoBMr0uncrw",authDomain:"thechampionship2026.firebaseapp.com",projectId:"thechampionship2026",storageBucket:"thechampionship2026.firebasestorage.app",messagingSenderId:"616059146400",appId:"1:616059146400:web:8fd0fd20276ccaed9ef9c5"};
    const fbApp=initializeApp(firebaseConfig);const db=getFirestore(fbApp);
    window.fbSaveMatch=async function(cupKey,matchId,score,winner){try{await setDoc(doc(db,'matches',cupKey+'__'+matchId),{cupKey,matchId,score,winner,updatedAt:Date.now()});}catch(e){console.error(e);}};
    window.fbListen=function(){
      onSnapshot(collection(db,'matches'),snapshot=>{
        // Apply ALL docs (not just changes) so order doesn't matter
        let changed=false;
        snapshot.docs.forEach(doc=>{
          const d=doc.data();
          const cup=CUP_STATE[d.cupKey];
          if(!cup)return;
          const m=cup.matches.find(x=>x.id===d.matchId);
          if(!m)return;
          if(d.score&&d.score.trim()&&(m.score!==d.score||m.winner!==d.winner)){
            m.score=d.score;m.done=true;m.winner=d.winner;changed=true;
          }
        });
        if(changed){
          // Reset all pending slots then re-propagate all winners
          for(const key of Object.keys(CUP_STATE)){
            const matches=CUP_STATE[key].matches;
            // First reset pending slots
            matches.forEach(m=>{if(!m.done&&!isBYE(m.score)){m.p1='Por definir';m.p2='Por definir';}});
            // Then propagate all completed matches in round order
            const ORDER=['16vos','8vos','4tos','Semis','Final'];
            ORDER.forEach(round=>{
              matches.filter(m=>m.done&&m.winner&&m.round===round)
                .forEach(m=>propagateWinner(matches,m));
            });
          }
          renderMain();
        }
      });
    };
    window.fbListenE2=function(){
      if(!window.E2_STATE) window.E2_STATE=JSON.parse(JSON.stringify(E2_GROUPS));
      onSnapshot(collection(db,'matches'),snapshot=>{
        let changed=false;
        snapshot.docChanges().forEach(change=>{
          if(change.type==='added'||change.type==='modified'){
            const d=change.doc.data();
            const catMatch=d.cupKey&&d.cupKey.match(/^e2_([AB])(\d+)$/);
            if(!catMatch)return;
            const cat=catMatch[1],grp=parseInt(catMatch[2]);
            const g=window.E2_STATE[cat]&&window.E2_STATE[cat].find(x=>x.group===grp);
            if(!g)return;
            const m=g.matches.find(x=>x.id===d.matchId);
            if(!m)return;
            if(d.score&&d.score.trim()&&(m.score!==d.score||m.winner!==d.winner)){
              m.score=d.score;m.done=true;m.winner=d.winner;changed=true;
            }
          }
        });
        if(changed&&view==='etapa2')renderEtapa2();
      });
    };
    window.addEventListener('load',()=>{
      if(typeof CUP_STATE!=='undefined')window.fbListen();
      else setTimeout(()=>window.fbListen(),500);
      if(typeof E2_GROUPS!=='undefined')window.fbListenE2();
      else setTimeout(()=>window.fbListenE2(),500);
    });
  </script>

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
function isWO(s)  { return s === 'WO'; }
function isBYE(s) { return s === 'BYE'; }
function isTBD(n) { return !n || n === 'Por definir'; }
function isTB(s)  { return s && s.trim().split(/\s+/).length === 3; }

function parseScore(score) {
  if (!score || isWO(score) || isBYE(score)) return null;
  const parts = score.trim().split(/\s+/);
  const sets = []; let p1=0, p2=0;
  parts.forEach((p,i) => {
    const m = p.match(/^(\d+)-(\d+)$/);
    if (!m) return;
    const a=parseInt(m[1]),b=parseInt(m[2]);
    sets.push({a,b,tb:i===2});
    if(a>b)p1++; else if(b>a)p2++;
  });
  return {sets, winner: p1>p2?1:p2>p1?2:null};
}

function setBoxesHtml(parsed, playerIdx) {
  if (!parsed) return '';
  return parsed.sets.map(s => {
    const val = playerIdx===1 ? s.a : s.b;
    const opp = playerIdx===1 ? s.b : s.a;
    const won = val > opp;
    const cls = s.tb ? 'set-box tb' : (won ? 'set-box won' : 'set-box lost');
    return `<div class="${cls}">${val}</div>`;
  }).join('');
}

function saveScore(id) {
  const el = document.getElementById('si-'+id);
  if (!el) return;
  const raw = el.value.trim();
  const cup = CUP_STATE[currentCup];
  const m = cup.matches.find(x => x.id === id);
  if (!m) return;

  // Handle W.O. 1 or W.O. 2
  const woMatch = raw.toUpperCase().replace(/\s+/g,' ').match(/^W\.?O\.?\s*([12])$/);
  if (woMatch) {
    const woNum = parseInt(woMatch[1]);
    // W.O. 1 = player 1 retires → player 2 advances
    // W.O. 2 = player 2 retires → player 1 advances
    m.score = 'WO'; m.done = true; m.winner = woNum === 1 ? m.p2 : m.p1;
    propagateWinner(cup.matches, m);
    editingId = null;
    if(window.fbSaveMatch){window.fbSaveMatch(currentCup,id,'WO',m.winner);showToast('✓ W.O. · '+m.winner+' avanza · Guardando...');}
    else{showToast('✓ W.O. — '+m.winner+' avanza');}
    renderMain();
    return;
  }

  if (!raw || !/\d+-\d+/.test(raw)) { showToast('Formato inválido. Ej: 6-3 7-5 · W.O. 1 · W.O. 2'); el.focus(); return; }
  const p = parseScore(raw);
  if (!p || !p.winner) { showToast('No se puede determinar el ganador'); el.focus(); return; }
  m.score = raw; m.done = true; m.winner = p.winner===1 ? m.p1 : m.p2;
  propagateWinner(cup.matches, m);
  editingId = null;
  if(window.fbSaveMatch){window.fbSaveMatch(currentCup,id,raw,m.winner);showToast('✓ '+m.winner+' · Guardando...');}else{showToast('✓ '+m.winner+' avanza'+(isTB(raw)?' (STB)':''));}
  renderMain();
}

function editScore(id) {
  const m = CUP_STATE[currentCup].matches.find(x => x.id === id);
  if (m) { m.done=false; m.score=''; m.winner=null; }
  propagateAllTBD(CUP_STATE[currentCup].matches);
  startEdit(id);
}

function propagateWinner(matches, finished) {
  const ORDER = ['16vos','8vos','4tos','Semis','Final'];
  const rIdx = ORDER.indexOf(finished.round);
  if (rIdx < 0 || rIdx >= ORDER.length-1) return;
  const nextRound = ORDER[rIdx+1];
  const rMatches = matches.filter(m => m.round === finished.round);
  const pos = rMatches.indexOf(finished);
  if (pos < 0) return;
  const nextMatches = matches.filter(m => m.round === nextRound);
  const nextIdx = Math.floor(pos/2);
  const slot = pos % 2;
  const next = nextMatches[nextIdx];
  if (!next || next.done) return;
  if (slot === 0) next.p1 = finished.winner; else next.p2 = finished.winner;
}

function propagateAllTBD(matches) {
  matches.filter(m=>!m.done).forEach(m=>{ m.p1='Por definir'; m.p2='Por definir'; });
  matches.filter(m=>m.done&&m.winner).forEach(m=>propagateWinner(matches,m));
}

function renderDraws() {
  const cup = CUP_STATE[currentCup];
  const matches = cup.matches;
  const real = matches.filter(m => !isBYE(m.score) && !(isTBD(m.p1)&&isTBD(m.p2)));
  const done = real.filter(m=>m.done).length;
  const total = real.length; const pend = total-done;
  const pct = total>0 ? Math.round(done/total*100) : 0;
  const ORDER = ['16vos','8vos','4tos','Semis','Final'];
  const avail = ORDER.filter(r => matches.some(m=>m.round===r&&!isBYE(m.score)));
  const pendByR = {};
  real.filter(m=>!m.done).forEach(m=>{ pendByR[m.round]=(pendByR[m.round]||0)+1; });

  const rtabs = ['all',...avail].map(r => {
    const p = r==='all' ? pend : (pendByR[r]||0);
    const badge = p>0 ? `<span class="badge-pend">${p}</span>` : '';
    return `<button class="rtab ${currentRound===r?'active':''}" onclick="setRound('${r}')">${r==='all'?'Todos':r}${badge}</button>`;
  }).join('');

  const filtered = (currentRound==='all' ? matches : matches.filter(m=>m.round===currentRound)).filter(m=>!isBYE(m.score));

  let matchHtml = '';
  if (currentRound === 'all') {
    avail.forEach(r => {
      const rms = filtered.filter(m=>m.round===r);
      if (!rms.length) return;
      const rd = rms.filter(m=>m.done).length;
      matchHtml += `<div class="round-group"><div class="round-header"><div class="rh-title">${r} de Final</div><div class="rh-count">${rd}/${rms.length} jugados</div></div>${rms.map(m=>cardHtml(m)).join('')}</div>`;
    });
  } else {
    const rms = filtered; const rd = rms.filter(m=>m.done).length;
    matchHtml = `<div class="round-group"><div class="round-header"><div class="rh-title">${currentRound} de Final</div><div class="rh-count">${rd}/${rms.length} jugados</div></div>${rms.map(m=>cardHtml(m)).join('')}</div>`;
  }

  document.getElementById('main').innerHTML = `
    <div class="cup-hero">
      <div class="cup-hero-top">
        <div class="cup-hero-title">${cup.type==='oro'?'🥇':'🥈'} ${cup.label}</div>
        <div class="cup-badge badge-${cup.type}">${cup.type==='oro'?'Copa Oro':'Copa Plata'}</div>
      </div>
      <div class="progress-track"><div class="progress-fill fill-${cup.type}" style="width:${pct}%"></div></div>
      <div class="cup-stats-row">
        <div class="cup-stat"><div class="cs-val">${done}</div><div class="cs-lbl">Jugados</div></div>
        <div class="cup-stat"><div class="cs-val" style="color:${pend>0?'var(--orange)':'var(--green)'}">${pend}</div><div class="cs-lbl">Pendientes</div></div>
        <div class="cup-stat"><div class="cs-val">${total}</div><div class="cs-lbl">Total</div></div>
        <div class="cup-stat"><div class="cs-val">${pct}%</div><div class="cs-lbl">Avance</div></div>
      </div>
    </div>
    <div class="round-nav">${rtabs}</div>
    <div class="draw-content">${matchHtml||'<div class="empty">Sin partidos</div>'}</div>`;
}

function cardHtml(m) {
  const p = m.done ? parseScore(m.score) : null;
  const w = p ? p.winner : null;
  const p1tbd = isTBD(m.p1), p2tbd = isTBD(m.p2);
  const bothTBD = p1tbd && p2tbd;
  const isWo = isWO(m.score); const tb = isTB(m.score);
  let stCls, stTxt;
  if (bothTBD)    { stCls='st-tbd';  stTxt='Por definir'; }
  else if (isWo)  { stCls='st-wo';   stTxt='W.O.'; }
  else if (m.done){ stCls='st-done'; stTxt='Finalizado'; }
  else            { stCls='st-pend'; stTxt='Pendiente'; }
  const p1cls = m.done?(w===1?'winner':'loser'):(p1tbd?'tbd':'');
  const p2cls = m.done?(w===2?'winner':'loser'):(p2tbd?'tbd':'');
  const p1n = p1tbd?'Por definir':m.p1; const p2n = p2tbd?'Por definir':m.p2;
  const p1click = !p1tbd ? `onclick="openPlayer('${m.p1.replace(/'/g,"\\'")}') "` : '';
  const p2click = !p2tbd ? `onclick="openPlayer('${m.p2.replace(/'/g,"\\'")}') "` : '';
  const p1woTag = isWo&&w===2 ? '<span class="wo-tag">W.O.</span>' : '';
  const p2woTag = isWo&&w===1 ? '<span class="wo-tag">W.O.</span>' : '';
  let footer = '';
  if (isAdmin && !bothTBD && !m.done && editingId !== m.id) footer = `<button class="btn-load" onclick="startEdit('${m.id}')">+ Cargar resultado</button>`;
  else if (isAdmin && m.done) footer = `<button class="btn-edit" onclick="editScore('${m.id}')">✎ Editar</button>`;
  else if (!m.done && editingId===m.id) footer = `<div class="score-form"><input class="input" id="si-${m.id}" placeholder="6-3 7-5 · 6-3 4-6 10-5 · W.O. 1 · W.O. 2" onkeydown="if(event.key==='Enter')saveScore('${m.id}')"/><button class="btn-ok" onclick="saveScore('${m.id}')">OK</button><button class="btn-cancel" onclick="cancelEdit()">✕</button></div><div class="score-hint">2 sets: <b>6-3 7-5</b> · STB: <b>6-3 4-6 10-5</b> · Walk Over: <b>W.O. 1</b> (gana J2) · <b>W.O. 2</b> (gana J1)</div>`;
  return `<div class="match-card">
    <div class="match-card-header"><div class="mh-round">${m.round} de Final</div><div class="mh-right">${tb?'<span class="stb-note">STB</span>':''}<span class="mh-status ${stCls}">${stTxt}</span></div></div>
    <div class="player-row ${p1cls}"><div class="pr-name" ${p1click}>${p1n}</div><div class="pr-sets">${setBoxesHtml(p,1)}${p1woTag}</div><div class="pr-check">${w===1?'✓':''}</div></div>
    <div class="player-row ${p2cls}"><div class="pr-name" ${p2click}>${p2n}</div><div class="pr-sets">${setBoxesHtml(p,2)}${p2woTag}</div><div class="pr-check">${w===2?'✓':''}</div></div>
    ${footer?`<div class="match-footer">${footer}</div>`:''}
  </div>`;
}

  Object.entries(CUP_STATE).forEach(([key,cup])=>{

      if(!m.done||isBYE(m.score)||!m.p1||!m.p2)return;
      const k=[m.p1,m.p2,m.round,key].join('|');

function getLivePlayoffMatches(name){
  const CKM={'catA_oro':'Cat A - ORO','catA_plata':'Cat A - PLATA','catB_oro':'Cat B - ORO','catB_plata':'Cat B - PLATA'};
  const live={};
  Object.entries(CUP_STATE).forEach(([key,cup])=>{
    const cupName=CKM[key];
    cup.matches.forEach(m=>{
      if(!m.done||isBYE(m.score))return;
      let opp=null,won=false;
      if(m.p1===name){opp=m.p2;won=m.winner===name;}
      else if(m.p2===name){opp=m.p1;won=m.winner===name;}
      if(!opp||isTBD(opp))return;
      const k=[name,opp,m.round,cupName].join('|');
      live[k]={opp,score:m.score,won,round:m.round,cup:cupName};
    });
  });
  return Object.values(live);
}

function flipScore(score){
  if(!score)return score;
  return score.trim().split(/\s+/).map(p=>{const m=p.match(/^(\d+)-(\d+)$/);return m?`${m[2]}-${m[1]}`:p;}).join(' ');
}

function matchCard(m,name){
  const won=m.winner===name;
  const opp=(m.p1===name)?m.p2:m.p1;
  const tb=m.score&&m.score.trim().split(/\s+/).length===3;
  const tbTag=tb?'<span class="gm-stb">STB</span>':'';
  const retTag=m.retired?'<span class="ret-tag">RET</span>':'';
  const sub=(m.instancia&&m.instancia!=='Fase de Grupos')?m.instancia:(m.fase||'Fase de Grupos');
  // Always show score from this player's perspective
  let score=m.score;
  if(score&&score!=='WO'&&score!=='RET'){
    // For hist matches (p1/p2 set): flip if this player is p2
    // For 2026 PLAYER_DATA (p1===name always): flip if score disagrees with won flag
    if(m.p2===name){
      score=flipScore(score);
    } else {
      const parts=score.trim().split(/\s+/).map(p=>p.match(/^(\d+)-(\d+)$/)).filter(Boolean);
      if(parts.length>=2){
        let w1=0,w2=0;
        parts.forEach(mm=>{parseInt(mm[1])>parseInt(mm[2])?w1++:w2++;});
        if(won!==(w1>w2)) score=flipScore(score);
      }
    }
  }
  return `<div class="result-card ${won?'won':'lost'}">
    <div class="rc-outcome ${won?'w':'l'}">${won?'V':'D'}</div>
    <div style="flex:1">
      <div class="rc-opp" onclick="openPlayer('${opp.replace(/'/g,"\\'")}') ">${opp}</div>
      <div style="font-size:.65rem;color:var(--muted)">${sub}</div>
    </div>
    <div class="rc-right"><div class="rc-score">${score}${tbTag}${retTag}</div></div>
  </div>`;
}

function buildPlayerSummary(name,allMatches,tw,tl,winPct){
  if(!allMatches.length)return '';
  const lines=[];
  const byYear={};
  allMatches.forEach(m=>{(byYear[m.year]=byYear[m.year]||[]).push(m);});
  let bestYear=null,bestPct=-1;
  Object.entries(byYear).forEach(([yr,ms])=>{
    const w=ms.filter(m=>m.winner===name).length;
    const l=ms.filter(m=>m.winner&&m.winner!==name).length;
    const pct=(w+l)>0?w/(w+l):0;
    if(pct>bestPct&&(w+l)>=3){bestPct=pct;bestYear=yr;}
  });
  const finals=allMatches.filter(m=>m.instancia==='Final');
  const finalsWon=finals.filter(m=>m.winner===name);
  let maxStreak=0,cur=0;
  [...allMatches].reverse().forEach(m=>{if(m.winner===name){cur++;maxStreak=Math.max(maxStreak,cur);}else if(m.winner)cur=0;});
  const etapas=new Set(allMatches.map(m=>m.year+'-E'+m.etapa));
  if(winPct>=60)lines.push(`Jugador dominante con ${winPct}% de efectividad en ${allMatches.length} partidos.`);
  else if(winPct>=40)lines.push(`${tw} victorias y ${tl} derrotas en ${allMatches.length} partidos a lo largo de ${etapas.size} etapa${etapas.size!==1?'s':''}.`);
  else lines.push(`${allMatches.length} partidos disputados en ${etapas.size} etapa${etapas.size!==1?'s':''}.`);
  if(finalsWon.length>0)lines.push(`🏆 Campeón en ${finalsWon.length} final${finalsWon.length>1?'es':''}.`);
  else if(finals.length>0)lines.push(`🥈 Llegó a ${finals.length} final${finals.length>1?'es':''}.`);
  if(maxStreak>=4)lines.push(`🔥 Mejor racha: ${maxStreak} victorias consecutivas.`);
  if(bestYear&&bestPct>=0.7)lines.push(`⭐ Mejor año: ${bestYear} (${Math.round(bestPct*100)}% de efectividad).`);
  return lines.length?`<div class="player-summary">${lines.join(' ')}</div>`:'';
}

function renderPlayerDetail(name){
  const d=PLAYER_DATA[name];
  const allMatches=[];
  HIST_MATCHES.forEach(m=>{if(m.p1!==name&&m.p2!==name)return;allMatches.push({...m});});
  if(d){
    (d.group_matches||[]).forEach(m=>{allMatches.push({year:2026,etapa:1,fase:'Fase de Grupos',instancia:'Fase de Grupos',p1:name,p2:m.opp,score:m.score,winner:m.won?name:m.opp,retired:m.retired});});
  }
  const live2026=getLivePlayoffMatches(name);
  const hKeys=new Set((d?.playoff_matches||[]).map(m=>[name,m.opp,m.round,m.cup].join('|')));
  const allPO26=[...(d?.playoff_matches||[]),...live2026.filter(m=>!hKeys.has([name,m.opp,m.round,m.cup].join('|')))];
  allPO26.forEach(m=>{const fase=m.cup.replace('Cat A - ','Cat. A – ').replace('Cat B - ','Cat. B – ');allMatches.push({year:2026,etapa:1,fase,instancia:m.round,p1:name,p2:m.opp,score:m.score,winner:m.won?name:m.opp});});
  // Etapa 2 matches from live state
  if (window.E2_STATE) {
    ['A','B'].forEach(cat => {
      (window.E2_STATE[cat]||[]).forEach(g => {
        g.matches.forEach(m => {
          if (!m.done || (m.p1 !== name && m.p2 !== name)) return;
          allMatches.push({
            year: 2026, etapa: 2,
            fase: 'Fase de Grupos E2',
            instancia: 'Grupo ' + g.group + ' · Cat. ' + cat,
            p1: m.p1, p2: m.p2,
            score: m.score, winner: m.winner
          });
        });
      });
    });
  }
  // Future etapas (3, 4) can be added here similarly
  allMatches.sort((a,b)=>b.year-a.year||b.etapa-a.etapa);
  const tw=allMatches.filter(m=>m.winner===name).length;
  const tl=allMatches.filter(m=>m.winner&&m.winner!==name).length;
  const winPct=(tw+tl)>0?Math.round(tw/(tw+tl)*100):0;
  const summaryHtml=buildPlayerSummary(name,allMatches,tw,tl,winPct);
  const byYearEtapa={};
  allMatches.forEach(m=>{
    if(!byYearEtapa[m.year])byYearEtapa[m.year]={};
    const ek=`E${m.etapa}`;
    if(!byYearEtapa[m.year][ek])byYearEtapa[m.year][ek]=[];
    byYearEtapa[m.year][ek].push(m);
  });
  const sortedYears=Object.keys(byYearEtapa).map(Number).sort((a,b)=>b-a);
  let yearSections='';
  sortedYears.forEach(yr=>{
    const etapaMap=byYearEtapa[yr];
    const sortedEtapas=Object.keys(etapaMap).sort((a,b)=>parseInt(b.slice(1))-parseInt(a.slice(1)));
    const yw=sortedEtapas.flatMap(e=>etapaMap[e]).filter(m=>m.winner===name).length;
    const yl=sortedEtapas.flatMap(e=>etapaMap[e]).filter(m=>m.winner&&m.winner!==name).length;
    let etapaSections='';
    sortedEtapas.forEach(ek=>{
      const ms=etapaMap[ek];
      const ew=ms.filter(m=>m.winner===name).length;
      const el=ms.filter(m=>m.winner&&m.winner!==name).length;
      etapaSections+=`<div style="margin-bottom:1rem">
        <div style="font-size:.68rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--blue-light)">
          <span>Etapa ${ek.slice(1)}</span><span style="font-weight:400;color:var(--muted)">${ew}V – ${el}D</span>
        </div>
        ${ms.map(m=>matchCard(m,name)).join('')}
      </div>`;
    });
    yearSections+=`<div class="phase-section">
      <div class="phase-title" style="border-bottom-color:#374151">
        <span style="color:#374151;font-size:.9rem;font-weight:800">${yr}</span>
        <span style="font-weight:400;color:var(--muted)">${yw}V – ${yl}D</span>
      </div>
      ${etapaSections}
    </div>`;
  });
  if(!yearSections)yearSections='<div class="empty">Sin partidos registrados</div>';
  document.getElementById('main').innerHTML=`
    <div class="back-bar" onclick="backToList()"><div class="back-btn">‹ Jugadores</div></div>
    <div class="player-hero">
      <div class="player-hero-name">${name}</div>
      <div class="player-stat-row">
        <div class="pstat"><div class="pstat-val" style="color:var(--green)">${tw}</div><div class="pstat-lbl">Victorias</div></div>
        <div class="pstat"><div class="pstat-val" style="color:var(--muted)">${tl}</div><div class="pstat-lbl">Derrotas</div></div>
        <div class="pstat"><div class="pstat-val">${allMatches.length}</div><div class="pstat-lbl">Partidos</div></div>
        <div class="pstat"><div class="pstat-val">${winPct}%</div><div class="pstat-lbl">Efectividad</div></div>
      </div>
      ${summaryHtml}
    </div>
    <div class="section-pad">${yearSections}</div>`;
}

function openH2HDropdown(which){h2hDropdown=which;if(which==='p1')h2hSearch1='';else h2hSearch2='';renderH2H();setTimeout(()=>{const el=document.getElementById('h2h-search-'+which);if(el)el.focus();},60);}
function closeH2HDropdown(){h2hDropdown=null;renderH2H();}
function selectH2HPlayer(which,name){if(which==='p1')h2hP1=name;else h2hP2=name;h2hDropdown=null;renderH2H();}

function normalizeCupName(cup){
  return cup
    .replace('Cat A - ORO','Cat. A – Copa Oro')
    .replace('Cat A - PLATA','Cat. A – Copa Plata')
    .replace('Cat B - ORO','Cat. B – Copa Oro')
    .replace('Cat B - PLATA','Cat. B – Copa Plata');
}

function getH2HMatches(a,b){
  const matches=[];
  HIST_MATCHES.forEach(m=>{if((m.p1===a&&m.p2===b)||(m.p1===b&&m.p2===a))matches.push({...m,source:'hist'});});
  const dA=PLAYER_DATA[a];
  if(dA){
    dA.group_matches.forEach(m=>{if(m.opp===b)matches.push({year:2026,etapa:1,fase:'Fase de Grupos',instancia:'Fase de Grupos',p1:a,p2:b,score:m.score,winner:m.won?a:b,source:'group2026'});});
    dA.playoff_matches.forEach(m=>{if(m.opp===b){
      const fase=normalizeCupName(m.cup);
      matches.push({year:2026,etapa:1,fase,instancia:m.round,p1:a,p2:b,score:m.score,winner:m.won?a:b,source:'playoff2026'});
    }});
  }
  const CKM={'catA_oro':'Cat. A – Copa Oro','catA_plata':'Cat. A – Copa Plata','catB_oro':'Cat. B – Copa Oro','catB_plata':'Cat. B – Copa Plata'};
  Object.entries(CUP_STATE).forEach(([key,cup])=>{
    cup.matches.forEach(m=>{
      if(!m.done||isBYE(m.score))return;
      if((m.p1===a&&m.p2===b)||(m.p1===b&&m.p2===a)){
        const canonFase=CKM[key]||'Copa';
        const already=matches.some(x=>x.source==='playoff2026'&&x.instancia===m.round&&x.fase===canonFase);
        if(!already)matches.push({year:2026,etapa:1,fase:canonFase,instancia:m.round,p1:m.p1,p2:m.p2,score:m.score,winner:m.winner,source:'live'});
      }
    });
  });
  // Etapa 2
  if(window.E2_STATE){
    ['A','B'].forEach(cat=>{
      (window.E2_STATE[cat]||[]).forEach(g=>{
        g.matches.forEach(m=>{
          if(!m.done||!m.score)return;
          if((m.p1===a&&m.p2===b)||(m.p1===b&&m.p2===a)){
            matches.push({year:2026,etapa:2,fase:'Fase de Grupos E2',instancia:'Grupo '+g.group+' · Cat. '+cat,p1:m.p1,p2:m.p2,score:m.score,winner:m.winner,source:'e2'});
          }
        });
      });
    });
  }
  matches.sort((a,b)=>b.year-a.year||b.etapa-a.etapa);
  return matches;
}

function renderH2H(){
  const allNames=new Set(PLAYERS_LIST);HIST_MATCHES.forEach(m=>{allNames.add(m.p1);allNames.add(m.p2);});
  const allPlayers=[...allNames].sort((a,b)=>a.localeCompare(b,'es'));
  const makeDropdown=(which)=>{
    const search=which==='p1'?h2hSearch1:h2hSearch2;
    const other=which==='p1'?h2hP2:h2hP1;
    const fil=allPlayers.filter(n=>n!==other&&n.toLowerCase().includes(search.toLowerCase()));
    return `<div class="h2h-dropdown">
      <input class="h2h-search" id="h2h-search-${which}" placeholder="Buscar..." value="${search}"
        oninput="${which==='p1'?'h2hSearch1':'h2hSearch2'}=this.value;renderH2H()"
        onkeydown="if(event.key==='Escape')closeH2HDropdown()"/>
      <div class="h2h-list">${fil.map(n=>`<div class="h2h-opt" onclick="selectH2HPlayer('${which}','${n.replace(/'/g,"\\'")}') ">${n}</div>`).join('')}</div>
    </div>`;
  };
  const p1onclick = h2hDropdown==='p1' ? 'closeH2HDropdown()' : "openH2HDropdown('p1')";
  const p2onclick = h2hDropdown==='p2' ? 'closeH2HDropdown()' : "openH2HDropdown('p2')";
  const selector=`<div class="h2h-selector">
    <div class="h2h-pick">
      <button class="h2h-pick-btn ${h2hP1?'selected':''}" onclick="${p1onclick}">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h2hP1||'Jugador 1'}</span><span>${h2hDropdown==='p1'?'▲':'▼'}</span>
      </button>
      ${h2hDropdown==='p1'?makeDropdown('p1'):''}
    </div>
    <div class="h2h-vs">VS</div>
    <div class="h2h-pick">
      <button class="h2h-pick-btn p2 ${h2hP2?'selected':''}" onclick="${p2onclick}">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h2hP2||'Jugador 2'}</span><span>${h2hDropdown==='p2'?'▲':'▼'}</span>
      </button>
      ${h2hDropdown==='p2'?makeDropdown('p2'):''}
    </div>
  </div>`;
  let body='';
  if(!h2hP1||!h2hP2){
    body='<div class="h2h-empty"><div class="h2h-empty-icon">⚔️</div><div>Seleccioná dos jugadores<br>para ver el historial</div></div>';
  } else {
    const matches=getH2HMatches(h2hP1,h2hP2);
    const p1w=matches.filter(m=>m.winner===h2hP1).length;
    const p2w=matches.filter(m=>m.winner===h2hP2).length;
    const hero=`<div class="h2h-hero"><div class="h2h-scoreboard">
      <div class="h2h-player p1"><div class="h2h-player-name">${h2hP1}</div><div class="h2h-player-wins">${p1w}</div></div>
      <div class="h2h-center"><div class="h2h-record">${matches.length} partido${matches.length!==1?'s':''}</div></div>
      <div class="h2h-player p2"><div class="h2h-player-name">${h2hP2}</div><div class="h2h-player-wins">${p2w}</div></div>
    </div></div>`;
    if(!matches.length){
      body=hero+'<div class="h2h-empty"><div class="h2h-empty-icon">🎾</div><div>No hay partidos entre estos jugadores</div></div>';
    } else {
      const mcards=matches.map(m=>{
        const tb=m.score&&m.score.split(' ').length===3;
        const p1won=m.winner===h2hP1,p2won=m.winner===h2hP2;
        let sc=m.score;
        if(m.p1===h2hP2&&m.p2===h2hP1){const pts=m.score.split(' ');sc=pts.map(p=>{const mm=p.match(/^(\d+)-(\d+)$/);return mm?`${mm[2]}-${mm[1]}`:p;}).join(' ');}
        return `<div class="h2h-match-card">
          <div class="h2h-match-meta"><span class="hist-year">${m.year}</span><span class="hist-etapa">Etapa ${m.etapa}</span><span class="hist-fase">${m.fase}</span>${m.instancia!=='Fase de Grupos'?`<span class="hist-instancia">${m.instancia}</span>`:''}</div>
          <div class="h2h-match-body">
            <div class="h2h-mp ${p1won?'won':'lost'}">${h2hP1}</div>
            <div class="h2h-mscore">${sc}${tb?'<span class="hist-stb">STB</span>':''}</div>
            <div class="h2h-mp right ${p2won?'won':'lost'}">${h2hP2}</div>
          </div>
        </div>`;
      }).join('');
      body=hero+`<div class="h2h-matches">${mcards}</div>`;
    }
  }
  document.getElementById('main').innerHTML=`
    <div style="background:var(--white);border-bottom:1px solid var(--border);padding:12px 1rem 8px">
      <div style="font-size:1rem;font-weight:700">Head to Head</div>
      <div style="font-size:.72rem;color:var(--muted);margin-top:2px">Historial completo entre dos jugadores</div>
    </div>
    ${selector}${body}`;
}

  // Cat tabs

// ── PARTIDOS view ─────────────────────────────────────────────────────────────
function renderE2PartidosCard(g) {
  const done = g.matches.filter(m=>m.done).length;
  const matchCards = g.matches.map(m => {
    const p1won = m.done && m.winner === m.p1;
    const p2won = m.done && m.winner === m.p2;
    const isEditing = isAdmin && editingE2Id === m.id;
    const tb = m.score && m.score.trim().split(/\s+/).length === 3;
    const scoreHtml = m.done
      ? `<div class="gm-score">${m.score}${tb?'<span class="gm-stb">STB</span>':''}</div><div style="font-size:.62rem;color:var(--muted);margin-top:1px">🏆 ${m.winner}</div>`
      : `<div style="font-size:.65rem;color:var(--muted)">Pendiente</div>`;
    let footer = '';
    if (isAdmin && !m.done && !isEditing)
      footer = `<button class="btn-load" onclick="startE2Edit('${m.id}',${g.group})">+ Cargar resultado</button>`;
    else if (isAdmin && m.done && !isEditing)
      footer = `<button class="btn-edit" onclick="startE2Edit('${m.id}',${g.group})">✎ Editar</button>`;
    else if (isEditing)
      footer = `<div class="score-form"><input class="input" id="e2si-${m.id}" placeholder="6-3 7-5 · 6-3 4-6 10-5 · W.O. 1 · W.O. 2" onkeydown="if(event.key==='Enter')saveE2Score('${m.id}','${e2Cat}',${g.group})"/><button class="btn-ok" onclick="saveE2Score('${m.id}','${e2Cat}',${g.group})">OK</button><button class="btn-cancel" onclick="cancelE2Edit()">✕</button></div>
      <div class="score-hint">2 sets: <b>6-3 7-5</b> · STB: <b>6-3 4-6 10-5</b> · W.O.: <b>W.O. 1</b> (gana J2) · <b>W.O. 2</b> (gana J1)</div>`;
    return `<div class="group-match-card">
      <div class="gm-players">
        <div class="gm-p1" style="font-weight:${p1won?700:400};color:${p1won?'var(--text)':'var(--muted)'}" onclick="openPlayer('${m.p1.replace(/'/g,"\\'")}')">${m.p1}</div>
        <div class="gm-vs">vs</div>
        <div class="gm-p2" style="font-weight:${p2won?600:400};color:${p2won?'var(--text)':'var(--muted)'}" onclick="openPlayer('${m.p2.replace(/'/g,"\\'")}')">${m.p2}</div>
      </div>
      <div style="text-align:right">${scoreHtml}</div>
      ${footer?`<div class="match-footer">${footer}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="phase-section">
    <div class="phase-title">
      <span>Grupo ${g.group}</span>
      <span style="font-weight:400;color:var(--muted);font-size:.68rem">${done}/${g.matches.length} jugados</span>
    </div>
    ${matchCards}
  </div>`;
}

// ── POSICIONES view ───────────────────────────────────────────────────────────
function renderE2PosicionesCard(g) {
  const stats = {};
  g.players.forEach(p => { stats[p] = {pj:0,pg:0,pp:0,pts:0,gg:0,gp:0}; });
  g.matches.forEach(m => {
    if (!m.done || !m.winner) return;
    const loser = m.winner === m.p1 ? m.p2 : m.p1;
    const isSTB = m.score && m.score !== 'WO' && m.score.trim().split(/\s+/).length === 3;
    const pts = isSTB ? 3 : 4;
    stats[m.winner].pj++; stats[m.winner].pg++; stats[m.winner].pts += pts;
    stats[loser].pj++;    stats[loser].pp++;
    // Dif games: solo los 2 primeros sets, no el super tiebreak
    if (m.score && m.score !== 'WO') {
      const parts = m.score.trim().split(/\s+/);
      const setsOnly = isSTB ? parts.slice(0, 2) : parts;
      setsOnly.forEach(s => {
        const mm = s.match(/^(\d+)-(\d+)$/);
        if (!mm) return;
        const a = parseInt(mm[1]), b = parseInt(mm[2]);
        stats[m.p1].gg += a; stats[m.p1].gp += b;
        stats[m.p2].gg += b; stats[m.p2].gp += a;
      });
    }
  });
  const sorted = g.players.slice().sort((a, b) =>
    stats[b].pts - stats[a].pts ||
    (stats[b].gg - stats[b].gp) - (stats[a].gg - stats[a].gp)
  );
  const rows = sorted.map((p, i) => {
    const s = stats[p];
    const isFirst = i === 0 && s.pts > 0;
    const dif = s.gg - s.gp;
    const difStr = dif > 0 ? '+' + dif : String(dif);
    const difColor = dif > 0 ? 'var(--green)' : dif < 0 ? '#e53e3e' : 'var(--muted)';
    const bg = isFirst ? 'var(--blue-light)' : (i % 2 === 0 ? '#fafbfc' : 'white');
    return `<div style="display:grid;grid-template-columns:24px 1fr 30px 40px 44px 36px;gap:0;background:${bg};border-bottom:1px solid var(--border);padding:6px 8px;align-items:center">
      <div style="font-size:.7rem;font-weight:700;color:var(--muted)">${i+1}</div>
      <div style="font-size:.82rem;font-weight:${isFirst?700:400};cursor:pointer" onclick="openPlayer('${p.replace(/'/g,"\'")}')">${p}</div>
      <div style="font-size:.72rem;color:var(--muted);text-align:center">${s.pj}</div>
      <div style="font-size:.72rem;color:var(--muted);text-align:center">${s.pg}-${s.pp}</div>
      <div style="font-size:.72rem;font-weight:${dif!==0?600:400};color:${difColor};text-align:center">${s.pj>0?difStr:'-'}</div>
      <div style="font-size:.8rem;font-weight:700;color:${isFirst?'var(--blue)':'var(--text)'};text-align:center">${s.pts}</div>
    </div>`;
  }).join('');
  return `<div class="phase-section">
    <div class="phase-title"><span>Grupo ${g.group}</span></div>
    <div style="background:var(--white);border-radius:8px;overflow:hidden;border:1px solid var(--border)">
      <div style="display:grid;grid-template-columns:24px 1fr 30px 40px 44px 36px;gap:0;background:#f0f2f5;border-bottom:2px solid var(--border);padding:5px 8px">
        <div style="font-size:.6rem;font-weight:700;color:var(--muted)">#</div>
        <div style="font-size:.6rem;font-weight:700;color:var(--muted)">JUGADOR</div>
        <div style="font-size:.6rem;font-weight:700;color:var(--muted);text-align:center">PJ</div>
        <div style="font-size:.6rem;font-weight:700;color:var(--muted);text-align:center">V-D</div>
        <div style="font-size:.6rem;font-weight:700;color:var(--muted);text-align:center">Dif G</div>
        <div style="font-size:.6rem;font-weight:700;color:var(--blue);text-align:center">Pts</div>
      </div>
      ${rows}
    </div>
  </div>`;
}


// ── EDIT / SAVE ───────────────────────────────────────────────────────────────
function startE2Edit(id, grp) {
  editingE2Id = id;
  renderEtapa2();
  setTimeout(() => { const el = document.getElementById('e2si-'+id); if(el) el.focus(); }, 60);
}
function cancelE2Edit() { editingE2Id = null; renderEtapa2(); }

function saveE2Score(id, cat, grp) {
  const el = document.getElementById('e2si-'+id);
  if (!el) return;
  const raw = el.value.trim();
  const g = window.E2_STATE[cat].find(x => x.group === grp);
  if (!g) return;
  const m = g.matches.find(x => x.id === id);
  if (!m) return;
  const woMatch = raw.toUpperCase().replace(/\s+/g,' ').match(/^W\.?O\.?\s*([12])$/);
  if (woMatch) {
    const woNum = parseInt(woMatch[1]);
    m.score = 'WO'; m.done = true; m.winner = woNum===1 ? m.p2 : m.p1;
    editingE2Id = null;
    if(window.fbSaveMatch) window.fbSaveMatch(`e2_${cat}${grp}`, id, 'WO', m.winner);
    showToast('✓ W.O. — ' + m.winner + ' avanza');
    renderEtapa2(); return;
  }
  if (!raw || !/\d+-\d+/.test(raw)) { showToast('Formato inválido. Ej: 6-3 7-5'); el.focus(); return; }
  const p = parseScore(raw);
  if (!p || !p.winner) { showToast('No se puede determinar el ganador'); el.focus(); return; }
  m.score = raw; m.done = true; m.winner = p.winner===1 ? m.p1 : m.p2;
  editingE2Id = null;
  if(window.fbSaveMatch) window.fbSaveMatch(`e2_${cat}${grp}`, id, raw, m.winner);
  showToast('✓ ' + m.winner + ' · Guardando...');
  renderEtapa2();
}



// ── RANKING ───────────────────────────────────────────────────────────────────
const RANKING_PTS = {
  'Campeón':   {oro:1500, plata:400},
  'Finalista': {oro:850,  plata:250},
  'Semis':     {oro:450,  plata:130},
  '4tos':      {oro:250,  plata:75},
  '8vos':      {oro:120,  plata:35},
  '16vos':     {oro:60,   plata:20},
  '32vos':     {oro:30,   plata:10},
};

function getPlayerRankingPts(name, etapa) {
  // Etapa 1: uses CUP_STATE (catA_oro, catA_plata, catB_oro, catB_plata)
  // Future etapas: add their CUP_STATE equivalent here
  const cupStateForEtapa = etapa === 1 ? CUP_STATE : null;
  if (!cupStateForEtapa) return 0;

  let pts = 0;
  const cupMap = {catA_oro:'oro', catA_plata:'plata', catB_oro:'oro', catB_plata:'plata'};
  const ORDER = ['32vos','16vos','8vos','4tos','Semis','Final'];

  Object.entries(cupStateForEtapa).forEach(([key, cup]) => {
    const type = cupMap[key];
    if (!type) return;
    const allMatches = cup.matches.filter(m => !isBYE(m.score));

    let bestRound = null;
    let lostRound = null;

    allMatches.forEach(m => {
      if (m.p1 !== name && m.p2 !== name) return;
      if (!m.done) return;
      const idx = ORDER.indexOf(m.round);
      const bestIdx = ORDER.indexOf(bestRound);
      if (idx >= bestIdx) {
        bestRound = m.round;
        if (m.winner !== name) lostRound = m.round;
      }
    });

    if (!bestRound) return;

    let label;
    if (lostRound) {
      label = lostRound === 'Final' ? 'Finalista' : lostRound;
    } else {
      // Still in tournament — guaranteed minimum points
      let bestWonRound = null;
      allMatches.forEach(m => {
        if (!m.done || m.winner !== name) return;
        const idx = ORDER.indexOf(m.round);
        if (idx > ORDER.indexOf(bestWonRound)) bestWonRound = m.round;
      });
      if (!bestWonRound) return;
      // They are guaranteed at minimum the next round's points
      const nextIdx = ORDER.indexOf(bestWonRound) + 1;
      label = ORDER[nextIdx] || 'Campeón';
      if (label === 'Final') label = 'Semis'; // in semis = guaranteed semis pts
    }

    // Won the final
    allMatches.forEach(m => {
      if (m.round === 'Final' && m.done && m.winner === name) label = 'Campeón';
    });

    const ptRow = RANKING_PTS[label];
    if (ptRow) pts += ptRow[type] || 0;
  });
  return pts;
}

function renderRanking() {
  // Build per-category sets
  const catA = new Set();
  const catB = new Set();
  ['catA_oro','catA_plata'].forEach(key => {
    (CUP_STATE[key]?.matches||[]).forEach(m => {
      if(!isBYE(m.score)){ if(!isTBD(m.p1)) catA.add(m.p1); if(!isTBD(m.p2)) catA.add(m.p2); }
    });
  });
  ['catB_oro','catB_plata'].forEach(key => {
    (CUP_STATE[key]?.matches||[]).forEach(m => {
      if(!isBYE(m.score)){ if(!isTBD(m.p1)) catB.add(m.p1); if(!isTBD(m.p2)) catB.add(m.p2); }
    });
  });
  Object.values(PLAYER_DATA).forEach(d => {
    (d.playoff_matches||[]).forEach(m => {
      if(m.cup?.startsWith('Cat A')) catA.add(d.name);
      if(m.cup?.startsWith('Cat B')) catB.add(d.name);
    });
  });

  // Get best round reached per cup for a player
  function getBestRound(name, cupKeys) {
    // Returns array of {label, cupType} for each cup the player participated in
    const ORDER = ['32vos','16vos','8vos','4tos','Semis','Final','Campeón'];
    const cupTypeMap = {catA_oro:'Oro',catA_plata:'Plata',catB_oro:'Oro',catB_plata:'Plata'};
    const results = [];
    cupKeys.forEach(key => {
      const cup = CUP_STATE[key];
      if(!cup) return;
      const cupType = cupTypeMap[key] || '';
      const allMatches = cup.matches.filter(m => !isBYE(m.score));
      let bestRound = null, lostRound = null;
      allMatches.forEach(m => {
        if(m.p1 !== name && m.p2 !== name) return;
        if(!m.done) return;
        const idx = ORDER.indexOf(m.round);
        if(idx >= ORDER.indexOf(bestRound)) {
          bestRound = m.round;
          if(m.winner !== name) lostRound = m.round;
        }
      });
      if(!bestRound) return;
      let label;
      if(lostRound) {
        label = lostRound === 'Final' ? 'Finalista' : lostRound;
      } else {
        let bestWon = null;
        allMatches.forEach(m => {
          if(!m.done||m.winner!==name) return;
          if(ORDER.indexOf(m.round) > ORDER.indexOf(bestWon)) bestWon = m.round;
        });
        if(!bestWon) return;
        const nextIdx = ORDER.indexOf(bestWon)+1;
        const nextRound = ORDER[nextIdx];
        label = nextRound==='Final' ? 'Finalista' : (nextRound||'Campeón');
      }
      allMatches.forEach(m => { if(m.round==='Final'&&m.done&&m.winner===name) label='Campeón'; });
      results.push({label, cupType});
    });
    return results; // [{label:'Finalista', cupType:'Oro'}, {label:'8vos', cupType:'Plata'}]
  }

  function calcPtsByCategory(name, category) {
    const cupKeys = category==='A' ? ['catA_oro','catA_plata'] : ['catB_oro','catB_plata'];
    const cupMap = {catA_oro:'oro',catA_plata:'plata',catB_oro:'oro',catB_plata:'plata'};
    const ORDER = ['32vos','16vos','8vos','4tos','Semis','Final'];
    let pts = 0;
    cupKeys.forEach(key => {
      const cup = CUP_STATE[key]; if(!cup) return;
      const type = cupMap[key];
      const allMatches = cup.matches.filter(m=>!isBYE(m.score));
      let bestRound=null, lostRound=null;
      allMatches.forEach(m => {
        if(m.p1!==name&&m.p2!==name) return;
        if(!m.done) return;
        const idx=ORDER.indexOf(m.round);
        if(idx>=ORDER.indexOf(bestRound)){bestRound=m.round; if(m.winner!==name)lostRound=m.round;}
      });
      if(!bestRound) return;
      let label;
      if(lostRound){ label=lostRound==='Final'?'Finalista':lostRound; }
      else {
        let bestWon=null;
        allMatches.forEach(m=>{if(!m.done||m.winner!==name)return; if(ORDER.indexOf(m.round)>ORDER.indexOf(bestWon))bestWon=m.round;});
        if(!bestWon) return;
        const nextIdx=ORDER.indexOf(bestWon)+1;
        const nextRound=ORDER[nextIdx];
        // If next round is Final, they're already a Finalist (guaranteed 2nd at minimum)
        label = nextRound==='Final' ? 'Finalista' : (nextRound||'Campeón');
      }
      allMatches.forEach(m=>{if(m.round==='Final'&&m.done&&m.winner===name)label='Campeón';});
      const ptRow=RANKING_PTS[label];
      if(ptRow) pts+=ptRow[type]||0;
    });
    return pts;
  }

  // Short label mapping
  const SHORT = {'Campeón':'Camp.','Finalista':'Final','Semis':'Semi','4tos':'4tos','8vos':'8vos','16vos':'16vos','32vos':'32vos'};

  if(!window.rankingCat) window.rankingCat = 'A';

  function buildTable(players, category) {
    const cupKeys = category==='A' ? ['catA_oro','catA_plata'] : ['catB_oro','catB_plata'];
    const rows = [...players]
      .map(name => {
        const e1pts = calcPtsByCategory(name, category);
        const e1round = getBestRound(name, cupKeys);
        const e2=0, e3=0, e4=0;
        return {name, e1pts, e1round, e2, e3, e4, total: e1pts+e2+e3+e4};
      })
      .filter(p => p.total > 0)
      .sort((a,b) => b.total - a.total);

    if(rows.length===0) return `<div style="padding:1.5rem;text-align:center;color:var(--muted);font-size:.85rem">Sin puntos registrados aún</div>`;

    // Scrollable table
    const header = `
      <div style="display:grid;grid-template-columns:32px minmax(120px,1fr) 52px 52px 90px 52px 52px 52px;gap:0;background:#f0f2f5;border-bottom:2px solid var(--border);padding:5px 8px;min-width:520px">
        <div style="font-size:.6rem;font-weight:700;color:var(--muted);text-align:center">#</div>
        <div style="font-size:.6rem;font-weight:700;color:var(--muted)">JUGADOR</div>
        <div style="font-size:.6rem;font-weight:700;color:var(--blue);text-align:center">TOTAL</div>
        <div style="font-size:.6rem;font-weight:700;color:var(--muted);text-align:center">E1 Pts</div>
        <div style="font-size:.6rem;font-weight:700;color:var(--muted);text-align:center">E1 Fase</div>
        <div style="font-size:.6rem;font-weight:700;color:var(--muted);text-align:center">E2</div>
        <div style="font-size:.6rem;font-weight:700;color:var(--muted);text-align:center">E3</div>
        <div style="font-size:.6rem;font-weight:700;color:var(--muted);text-align:center">E4</div>
      </div>`;

    const fmt = v => v > 0 ? v : '-';
    const rowsHtml = rows.map(({name,e1pts,e1round,e2,e3,e4,total},i) => {
      const bg = i%2===0?'#fafbfc':'white';
      // Build phase display: e.g. "Final Oro / 8vos Plata"
      const phaseHtml = (e1round||[]).map(r =>
        `<div style="font-size:.6rem;white-space:nowrap">${SHORT[r.label]||r.label} <span style="color:${r.cupType==='Oro'?'#b8860b':'#607d8b'};font-weight:600">${r.cupType}</span></div>`
      ).join('') || '<div style="font-size:.68rem;color:var(--muted)">-</div>';
      return `<div style="display:grid;grid-template-columns:32px minmax(120px,1fr) 52px 52px 90px 52px 52px 52px;gap:0;background:${bg};border-bottom:1px solid var(--border);padding:6px 8px;align-items:center;min-width:520px">
        <div style="font-size:.72rem;font-weight:700;color:var(--muted);text-align:center">${i+1}</div>
        <div style="font-size:.82rem;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" onclick="openPlayer('${name.replace(/'/g,"\'")}')">${name}</div>
        <div style="font-size:.85rem;font-weight:700;color:var(--blue);text-align:center">${total}</div>
        <div style="font-size:.72rem;color:var(--muted);text-align:center">${fmt(e1pts)}</div>
        <div style="text-align:center">${phaseHtml}</div>
        <div style="font-size:.72rem;color:var(--muted);text-align:center">-</div>
        <div style="font-size:.72rem;color:var(--muted);text-align:center">-</div>
        <div style="font-size:.72rem;color:var(--muted);text-align:center">-</div>
      </div>`;
    }).join('');

    return `<div style="overflow-x:auto;border:1px solid var(--border);border-radius:8px;background:var(--white)">
      ${header}${rowsHtml}
    </div>`;
  }

  // Category selector tabs
  const catTabs = `
    <div style="display:flex;gap:8px;padding:10px 1rem;background:var(--white);border-bottom:1px solid var(--border)">
      <button onclick="window.rankingCat='A';renderRanking()" class="cup-tab ${window.rankingCat==='A'?'active-oro':''}">Categoría A</button>
      <button onclick="window.rankingCat='B';renderRanking()" class="cup-tab ${window.rankingCat==='B'?'active-oro':''}">Categoría B</button>
    </div>`;

  const players = window.rankingCat==='A' ? catA : catB;
  const tableHtml = buildTable(players, window.rankingCat);

  document.getElementById('main').innerHTML = `
    <div style="background:var(--white);border-bottom:1px solid var(--border);padding:12px 1rem 8px">
      <div style="font-size:1rem;font-weight:700">🏅 Ranking 2026</div>
      <div style="font-size:.72rem;color:var(--muted);margin-top:2px">Puntos por copa y etapa</div>
    </div>
    ${catTabs}
    <div class="section-pad" style="padding-bottom:2rem">
      ${tableHtml}
      <div style="padding:.8rem 0;font-size:.65rem;color:var(--muted);line-height:1.8">
        <b>Puntos por ronda:</b><br>
        Campeón: 1500 (Oro) / 400 (Plata) · Finalista: 850 / 250<br>
        Semis: 450 / 130 · 4tos: 250 / 75 · 8vos: 120 / 35 · 16vos: 60 / 20
      </div>
    </div>`;
}

window._splashReady = false;
window._splashImgLoaded = false;
function _hideSplash() {
  window._splashReady = true;
  const loader = document.getElementById('app-loading');
  if (loader) {
    loader.style.transition = 'opacity .5s ease';
    loader.style.opacity = '0';
    setTimeout(() => { loader.style.display = 'none'; }, 500);
  }
}
function _waitAndHide() {
  if (window._splashImgLoaded) {
    setTimeout(_hideSplash, 2000);
  } else {
    setTimeout(_waitAndHide, 100); // check every 100ms
  }
}
